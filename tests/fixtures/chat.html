<!DOCTYPE html>
<!--
  MANUAL TEST FIXTURE — 1:1 / group chat
  Load as a local file in Edge with the extension active.
  URL must contain "/chat/" for context detection.

  Selectors used by content.js:
    Chat title      : [data-tid='chat-header-title']
    Participants    : [data-tid='chat-header-participant']
    Message root    : [data-tid='message-body']
    Author          : [data-tid='message-author-name']
    Timestamp       : time
    Body            : [data-tid='message-body-content']
-->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Teams Chat Fixture — /chat/19:abc123</title>
</head>
<body>

  <!-- Chat header: title + participant names -->
  <header>
    <span data-tid="chat-header-title">Alice Nguyen, David Park</span>
    <span data-tid="chat-header-participant">Alice Nguyen</span>
    <span data-tid="chat-header-participant">David Park</span>
  </header>

  <!-- ── Message 1 ── -->
  <div data-tid="message-body">
    <span data-tid="message-author-name">Alice Nguyen</span>
    <time datetime="2026-05-04T14:00:00Z">Mon 2:00 PM</time>
    <div data-tid="message-body-content">Hey David, can you review the design doc I shared this morning?</div>
  </div>

  <!-- ── Message 2 ── -->
  <div data-tid="message-body">
    <span data-tid="message-author-name">David Park</span>
    <time datetime="2026-05-04T14:03:00Z">Mon 2:03 PM</time>
    <div data-tid="message-body-content">On it — I'll leave comments by end of day.</div>
  </div>

  <!-- ── Message 3 ── -->
  <div data-tid="message-body">
    <span data-tid="message-author-name">Alice Nguyen</span>
    <time datetime="2026-05-04T14:04:00Z">Mon 2:04 PM</time>
    <div data-tid="message-body-content">Perfect, thanks! Ping me if anything looks off.</div>
  </div>

</body>
</html>
